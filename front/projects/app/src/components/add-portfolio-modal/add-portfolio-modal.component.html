<div class="add-portfolio-modal-backdrop" *ngIf="isOpen" (click)="handleBackdropClick()">
  <div class="add-portfolio-modal" (click)="$event.stopPropagation()">
    <h3>Novo item de portfólio</h3>

    <div class="add-portfolio-modal__form">
      <label>
        Código
        <app-simple-input [value]="codigo()" (valueChange)="handleCodigoChange($event)"></app-simple-input>
      </label>

      <label>
        Nome
        <input type="text" [value]="nome()" (input)="handleNomeChange($any($event.target).value)" />
      </label>

      <label>
        Quantidade
        <app-simple-input-number [allowDecimal]="false" [allowNegative]="false"
          [value]="(quantidade() ?? '').toString()"
          (valueChange)="handleQuantidadeChange($event)"></app-simple-input-number>
      </label>

      <label>
        Preço Médio
        <app-simple-input-number [allowDecimal]="true" [allowNegative]="false" [value]="(precoMedio() ?? '').toString()"
          (valueChange)="handlePrecoMedioChange($event)"></app-simple-input-number>
      </label>
    </div>

    <p class="add-portfolio-modal__validation" *ngIf="validationMessage()">{{ validationMessage() }}</p>

    <div class="add-portfolio-modal__actions">
      <app-simple-button variant="cancelar" [disabled]="isSaving" (btnClick)="close()">Cancelar</app-simple-button>
      <app-simple-button [disabled]="isSaving" (btnClick)="submit()">{{ isSaving ? 'Salvando...' : 'Salvar'
        }}</app-simple-button>
    </div>
  </div>
</div>
